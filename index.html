<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Text Sync</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; }
        h2 { margin-top: 0; color: #333; }

        .section { margin-bottom: 30px; }
        .section.hebrew { direction: rtl; text-align: right; }

        .transcript {
            font-size: 1.6em;
            line-height: 2.2;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
            min-height: 60px;
        }
        .transcript span {
            padding: 4px 6px;
            margin: 2px;
            border-radius: 4px;
            transition: all 0.1s;
            display: inline-block;
        }
        .transcript span.active {
            background: linear-gradient(135deg, #ffeb3b, #ffc107);
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(255,193,7,0.4);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        audio { width: 100%; margin-top: 10px; }

        button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: #2196F3;
            color: white;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Karaoke Text Sync</h1>

        <!-- English Section -->
        <div class="section">
            <h2>English</h2>
            <div class="transcript" id="enTranscript"></div>
            <audio id="enAudio" src="Cat.mp3" controls></audio>
            <div class="controls">
                <button id="enToggle">Disable Highlight</button>
            </div>
        </div>

        <!-- Hebrew Section -->
        <div class="section hebrew">
            <h2>Hebrew</h2>
            <div class="transcript" id="heTranscript"></div>
            <audio id="heAudio" src="Cat_HE.mp3" controls></audio>
            <div class="controls">
                <button id="heToggle">Disable Highlight</button>
            </div>
        </div>
    </div>

    <script>
        // ========== SYNC DATA (from AssemblyAI) ==========
        const enSyncData = [
            { start: 0.16, end: 0.44, text: "Cats" },
            { start: 0.44, end: 0.84, text: "cannot" },
            { start: 0.84, end: 1.28, text: "taste" },
            { start: 1.28, end: 1.8, text: "sweet" },
            { start: 1.8, end: 2.16, text: "things." },
            { start: 2.56, end: 2.88, text: "Their" },
            { start: 2.88, end: 3.32, text: "bodies" },
            { start: 3.32, end: 3.72, text: "simply" },
            { start: 3.72, end: 3.92, text: "do" },
            { start: 3.92, end: 4.16, text: "not" },
            { start: 4.16, end: 4.36, text: "have" },
            { start: 4.36, end: 4.52, text: "the" },
            { start: 4.52, end: 4.8, text: "special" },
            { start: 4.88, end: 5.2, text: "part" },
            { start: 5.2, end: 5.4, text: "that" },
            { start: 5.4, end: 5.72, text: "lets" },
            { start: 5.72, end: 5.92, text: "them" },
            { start: 5.92, end: 6.24, text: "taste" },
            { start: 6.24, end: 6.72, text: "sweetness" },
            { start: 6.72, end: 6.92, text: "at" },
            { start: 6.92, end: 7.2, text: "all." }
        ];

        const heSyncData = [
            { start: 0.031, end: 0.571, text: "חתולים" },
            { start: 0.571, end: 0.731, text: "לא" },
            { start: 0.731, end: 1.131, text: "יכולים" },
            { start: 1.131, end: 1.511, text: "לטעום" },
            { start: 1.511, end: 1.971, text: "מתוק." },
            { start: 2.451, end: 2.771, text: "בגוף" },
            { start: 2.771, end: 3.331, text: "שלהם" },
            { start: 3.331, end: 3.551, text: "אין" },
            { start: 3.551, end: 3.731, text: "את" },
            { start: 3.731, end: 4.111, text: "החלק" },
            { start: 4.111, end: 4.571, text: "שיודע" },
            { start: 4.571, end: 5.131, text: "להרגיש" },
            { start: 5.131, end: 5.371, text: "טעם" },
            { start: 5.371, end: 5.871, text: "מתוק." }
        ];

        // ========== DOM ELEMENTS ==========
        const enAudio = document.getElementById('enAudio');
        const heAudio = document.getElementById('heAudio');
        const enTranscript = document.getElementById('enTranscript');
        const heTranscript = document.getElementById('heTranscript');

        // ========== STATE ==========
        let enKaraokeOn = true;
        let heKaraokeOn = true;
        let enSpans = [];
        let heSpans = [];

        // ========== BUILD TRANSCRIPT ==========
        function buildTranscript(syncData, container, spansArray) {
            container.innerHTML = '';
            spansArray.length = 0;

            syncData.forEach(item => {
                const span = document.createElement('span');
                span.textContent = item.text;
                span.dataset.start = item.start;
                span.dataset.end = item.end;
                container.appendChild(span);
                container.appendChild(document.createTextNode(' '));
                spansArray.push(span);
            });
        }

        buildTranscript(enSyncData, enTranscript, enSpans);
        buildTranscript(heSyncData, heTranscript, heSpans);

        // ========== KARAOKE SYNC ==========
        enAudio.addEventListener('timeupdate', () => {
            if (!enKaraokeOn) return;
            const t = enAudio.currentTime;
            enSpans.forEach(span => {
                const s = parseFloat(span.dataset.start);
                const e = parseFloat(span.dataset.end);
                span.classList.toggle('active', t >= s && t < e);
            });
        });

        heAudio.addEventListener('timeupdate', () => {
            if (!heKaraokeOn) return;
            const t = heAudio.currentTime;
            heSpans.forEach(span => {
                const s = parseFloat(span.dataset.start);
                const e = parseFloat(span.dataset.end);
                span.classList.toggle('active', t >= s && t < e);
            });
        });

        // ========== TOGGLE BUTTONS ==========
        document.getElementById('enToggle').addEventListener('click', function() {
            enKaraokeOn = !enKaraokeOn;
            this.textContent = enKaraokeOn ? 'Disable Highlight' : 'Enable Highlight';
            if (!enKaraokeOn) enSpans.forEach(span => span.classList.remove('active'));
        });

        document.getElementById('heToggle').addEventListener('click', function() {
            heKaraokeOn = !heKaraokeOn;
            this.textContent = heKaraokeOn ? 'Disable Highlight' : 'Enable Highlight';
            if (!heKaraokeOn) heSpans.forEach(span => span.classList.remove('active'));
        });
    </script>
</body>
</html>
